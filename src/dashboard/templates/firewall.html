<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intervention — ThreeSentinel</title>
  <meta name="description" content="Système de détection et réponse automatique aux intrusions — ThreeSentinel"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <script src="/static/api_client.js"></script>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    ThreeSentinel
  </a>
  <nav class="nav-links">
    <a href="/dashboard" class="nav-link">Surveillance</a>
    <a href="/firewall" class="nav-link active">Intervention</a>
    <a href="/analysis" class="nav-link">Analyse</a>
  </nav>
  <div class="status-badge">
    <span class="pulse"></span>
    Système actif
  </div>
  <div style="display:flex; align-items:center; gap:20px;">
    <div class="header-time" id="clock">--:--:--</div>
    <a href="/help" class="help-btn" title="Aide">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </a>
  </div>
</header>

<main style="max-width: 900px; margin: 0 auto;">

  <div style="display: flex; flex-direction: column; gap: 24px;">

    <!-- Unblock / Whitelist actions -->
    <div>
      <div class="section-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Actions manuelles
      </div>
      <div class="card">
        <div class="action-bar" style="margin-bottom: 0;">
          <input id="ip-input" type="text" placeholder="Entrez une adresse IP (ex: 185.147.82.139)" autocomplete="off"/>
          <button class="btn-outline danger" onclick="doUnblock()">Débloquer l'IP</button>
          <button class="btn-outline" onclick="doWhitelist()">Ajouter à la Whitelist</button>
        </div>
      </div>
    </div>

    <!-- Blocked IPs -->
    <div>
      <div class="section-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
        Pare-feu : IPs actuellement bloquées
      </div>
      <div class="card">
        <div class="blocked-list" id="blocked-list" style="max-height: 500px;">
          <div style="color:var(--muted);font-size:.82rem">Chargement…</div>
        </div>
      </div>
    </div>

  </div>

</main>

<div id="toast"></div>

<script>
const API = '';

async function refreshBlocked() {
  const d = await apiCall('/api/blocked');
  const el = document.getElementById('blocked-list');
  if (!d || !d.blocked || Object.keys(d.blocked).length === 0) {
    el.innerHTML = '<div style="color:var(--ok);font-size:.85rem;padding:20px;text-align:center;">✓ Le pare-feu ne bloque aucune IP actuellement.</div>';
    return;
  }
  el.innerHTML = Object.entries(d.blocked).map(([ip, info]) => `
    <div class="blocked-item">
      <span style="font-size: 1rem; font-weight: bold;">${ip}</span>
      <span style="color:var(--muted);font-size:.85rem">${info.reason ? info.reason : ''}</span>
      <button class="btn-outline danger" style="padding: 4px 10px;" onclick="quickUnblock('${ip}')">Débloquer</button>
    </div>
  `).join('');
}

async function doUnblock() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  const d = await apiCall(`/api/unblock/${ip}`, {method:'POST'});
  if (d && d.unblocked) {
    showToast(`✓ IP ${ip} débloquée`);
    refreshBlocked();
  } else {
    showToast(`✗ Échec déblocage ${ip}`, false);
  }
}

async function doWhitelist() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  const d = await apiCall(`/api/whitelist/${ip}`, {method:'POST'});
  if (d && d.whitelisted) {
    showToast(`✓ IP ${ip} ajoutée à la whitelist`);
  } else {
    showToast(`✗ Erreur whitelist`, false);
  }
}

async function quickUnblock(ip) {
  const d = await apiCall(`/api/unblock/${ip}`, {method:'POST'});
  if (d && d.unblocked) {
    showToast(`✓ IP ${ip} débloquée`);
    refreshBlocked();
  }
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR');
}
setInterval(updateClock, 1000);
updateClock();

refreshBlocked();
setInterval(refreshBlocked, 5000);
</script>
</body>
</html>
